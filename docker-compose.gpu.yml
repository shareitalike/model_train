version: "3.9"
# GPU override: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d --build

services:
  backend:
    environment:
      OCR_BATCH_SIZE: "16"
      NVIDIA_VISIBLE_DEVICES: all
      CUDA_VISIBLE_DEVICES: "0"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    runtime: nvidia

  celery_worker:
    environment:
      OCR_BATCH_SIZE: "16"
      NVIDIA_VISIBLE_DEVICES: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    runtime: nvidia
