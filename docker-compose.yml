version: "3.9"

services:

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks: [kaithi-net]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    networks: [kaithi-net]

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: ./backend/.env.example
    environment:
      DATABASE_URL:      postgresql+asyncpg://kaithi:kaithi123@postgres:5432/kaithi_db
      DATABASE_SYNC_URL: postgresql://kaithi:kaithi123@postgres:5432/kaithi_db
      REDIS_URL:         redis://redis:6379/0
      MINIO_ENDPOINT:    minio:9000
    volumes:
      - model_cache:/app/models
      - backend_logs:/app/logs
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
      minio:    { condition: service_started }
    restart: unless-stopped
    networks: [kaithi-net]

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      celery -A tasks.celery_app worker
        --loglevel=info
        --concurrency=2
        -Q celery
        --max-tasks-per-child=10
    env_file: ./backend/.env.example
    environment:
      DATABASE_SYNC_URL: postgresql://kaithi:kaithi123@postgres:5432/kaithi_db
      REDIS_URL:         redis://redis:6379/0
      MINIO_ENDPOINT:    minio:9000
    volumes:
      - model_cache:/app/models
      - backend_logs:/app/logs
    depends_on:
      - backend
      - redis
      - postgres
    restart: unless-stopped
    networks: [kaithi-net]

  flower:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A tasks.celery_app flower --port=5555
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on: [redis]
    restart: unless-stopped
    networks: [kaithi-net]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       kaithi_db
      POSTGRES_USER:     kaithi
      POSTGRES_PASSWORD: kaithi123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaithi -d kaithi_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [kaithi-net]

  redis:
    image: redis:7-alpine
    command: >
      redis-server
        --appendonly yes
        --maxmemory 1gb
        --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks: [kaithi-net]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks: [kaithi-net]

volumes:
  postgres_data:
  redis_data:
  minio_data:
  model_cache:
  backend_logs:

networks:
  kaithi-net:
    driver: bridge
